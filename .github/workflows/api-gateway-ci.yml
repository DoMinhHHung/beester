name: API Gateway CI

on:
  pull_request:
    paths:
      - "api-gateway/**"
      - ".github/workflows/api-gateway-ci.yml"
  push:
    branches: [main]
    paths:
      - "api-gateway/**"
      - ".github/workflows/api-gateway-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: api-gateway

    env:
      REDIS_TEST_ADDR: 127.0.0.1:6379

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
          cache-dependency-path: api-gateway/go.sum

      - name: Tidy module
        run: go mod tidy

      - name: Upload tidied module files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-module-files
          path: |
            api-gateway/go.mod
            api-gateway/go.sum

      - name: Verify module files are tidy
        run: git diff --exit-code -- go.mod go.sum

      - name: Verify formatting
        run: test -z "$(gofmt -l $(find . -name '*.go' -type f))"

      - name: Vet
        run: go vet ./...

      - name: Race tests
        run: go test -race ./...

      - name: Build
        run: go build ./cmd/beester
